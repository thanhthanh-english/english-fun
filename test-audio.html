<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔊 Test v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;padding:20px;background:#1a1a2e;color:#fff}
h2{text-align:center;margin-bottom:15px}
.btn{display:block;width:100%;padding:16px;margin:8px 0;border:none;border-radius:12px;font-size:.95rem;font-weight:bold;cursor:pointer;color:#fff}
.b1{background:#e74c3c}.b2{background:#3498db}.b3{background:#2ecc71}.b4{background:#f39c12}.b5{background:#9b59b6}
.st{font-size:.85rem;color:#aaa;margin:3px 0 10px 0}
#log{background:#111;padding:12px;border-radius:10px;margin-top:15px;font-size:.75rem;color:#0f0;max-height:250px;overflow-y:auto;white-space:pre-wrap}
</style></head><body>
<h2>🔊 Test Âm Thanh v2</h2>
<p style="text-align:center;color:#aaa;margin-bottom:15px;font-size:.85rem">Bấm từng nút, nút nào có tiếng = ✅</p>

<button class="btn b1" onclick="t1()">1️⃣ Web Audio Beep (tạo âm thanh trực tiếp)</button>
<div class="st" id="s1">Chưa test</div>

<button class="btn b2" onclick="t2()">2️⃣ VoiceRSS API</button>
<div class="st" id="s2">Chưa test</div>

<button class="btn b3" onclick="t3()">3️⃣ StreamElements TTS</button>
<div class="st" id="s3">Chưa test</div>

<button class="btn b4" onclick="t4()">4️⃣ ResponsiveVoice Direct URL</button>
<div class="st" id="s4">Chưa test</div>

<button class="btn b5" onclick="t5()">5️⃣ Oddcast TTS</button>
<div class="st" id="s5">Chưa test</div>

<div id="log">Log:\n</div>

<script>
var L=document.getElementById('log');
function lg(m){L.textContent+=m+'\n';L.scrollTop=L.scrollHeight}
function ss(id,ok,msg){document.getElementById(id).textContent=(ok?'✅ ':'❌ ')+msg}
lg('UA: '+navigator.userAgent.substring(0,60));

function playUrl(url,sid,name){
    ss(sid,false,'Đang tải...');lg(name+': loading...');
    var a=new Audio(url);
    a.oncanplaythrough=function(){lg(name+': can play, starting...');a.play()};
    a.onended=function(){ss(sid,true,name+' works!');lg(name+': SUCCESS')};
    a.onerror=function(e){ss(sid,false,'Không tải được');lg(name+': LOAD ERROR')};
    a.load();
    var p=a.play();
    if(p)p.then(function(){lg(name+': play() OK')}).catch(function(e){
        ss(sid,false,'Play blocked: '+e.message);lg(name+': BLOCKED - '+e.message);
    });
}

// Test 1: Web Audio API beep (generates sound locally, no network needed)
function t1(){
    ss('s1',false,'Đang tạo âm thanh...');lg('T1: Web Audio beep...');
    try{
        var ctx=new(window.AudioContext||window.webkitAudioContext)();
        var osc=ctx.createOscillator();
        var gain=ctx.createGain();
        osc.connect(gain);gain.connect(ctx.destination);
        osc.frequency.value=440;
        gain.gain.value=0.3;
        osc.start(0);
        setTimeout(function(){
            osc.stop();ctx.close();
            ss('s1',true,'Beep thành công! Web Audio hoạt động');lg('T1: SUCCESS');
        },800);
        ss('s1',false,'Đang phát beep...');
    }catch(e){ss('s1',false,'Lỗi: '+e.message);lg('T1: ERROR '+e.message)}
}

// Test 2: VoiceRSS
function t2(){
    playUrl('https://api.voicerss.org/?key=c3ccc7ce25c44358b4e0e8bad8db4e4b&hl=en-us&src=Hello+this+is+a+voice+test&c=MP3','s2','VoiceRSS');
}

// Test 3: StreamElements TTS
function t3(){
    playUrl('https://api.streamelements.com/kappa/v2/speech?voice=Brian&text=Hello+this+is+a+stream+elements+test','s3','StreamElements');
}

// Test 4: ResponsiveVoice direct audio URL
function t4(){
    playUrl('https://texttospeech.responsivevoice.org/v1/text:synthesize?text=Hello+this+is+responsive+voice+direct&lang=en&engine=g1&name=&pitch=0.5&rate=0.5&volume=1&key=pVAluRyih','s4','RV-Direct');
}

// Test 5: Oddcast
function t5(){
    playUrl('https://cache-a.oddcast.com/tts/genB.php?EID=2&LID=1&VID=2&TXT=Hello+this+is+a+test&IS_UTF8=1&ACC=3314795&API=2292376&SESSION=default','s5','Oddcast');
}
</script></body></html>
